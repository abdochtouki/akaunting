name: Build, Test and Deploy to Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Cache Composer dependencies
      uses: actions/cache@v2
      with:
        path: ~/.composer/cache
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Set up PHP with required extensions
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.1
        extensions: bcmath, intl, zip, gd

    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-interaction

    - name: Run tests
      run: vendor/bin/phpunit --configuration phpunit.xml

    - name: Build Docker image
      run: |
        docker build -t abdochtouki/my-app:${{ github.sha }} .

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image to Docker Hub
      run: |
        docker push abdochtouki/my-app:${{ github.sha }}

  cleanup:
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Post job cleanup
      run: |
        echo "Cleaning up..."
        # Vous pouvez ajouter ici des étapes supplémentaires si nécessaire pour nettoyer après l'exécution des jobs.

  # Optionnel : Déployer sur votre serveur ou service après la publication sur Docker Hub.
