name: Build, Test and Deploy to Docker Hub

on:
  push:
    branches:
      - main  # Trigger the workflow when code is pushed to the main branch
  pull_request:
    branches:
      - main  # Trigger the workflow on PR to main branch

jobs:
  build:
    runs-on: ubuntu-latest  # Run the job on the latest Ubuntu environment

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2  # Checkout the code from the repository

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2  # Set up Docker Buildx for building multi-platform images

    - name: Log in to Docker Hub
      uses: docker/login-action@v2  # Log in to Docker Hub
      with:
        username: ${{ secrets.DOCKER_USERNAME }}  # Docker Hub username stored in GitHub Secrets
        password: ${{ secrets.DOCKER_PASSWORD }}  # Docker Hub password stored in GitHub Secrets

    - name: Build the Docker image
      run: |
        docker build -t abdochtouki/my-app:${{ github.sha }} .  # Build Docker image with commit SHA as tag

    - name: Run tests (optional)
      run: |
        docker run --rm abdochtouki/my-app:${{ github.sha }} npm test  # Example test command, change it to your own test command

    - name: Push Docker image to Docker Hub
      run: |
        docker push abdochtouki/my-app:${{ github.sha }}  # Push the image to Docker Hub with the commit SHA tag
        docker push abdochtouki/my-app:latest  # Optionally, also push the image with 'latest' tag

  deploy:
    runs-on: ubuntu-latest  # Run the deployment on the latest Ubuntu environment
    needs: build  # Ensure the build job has completed successfully before running this job

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2  # Checkout the code from the repository

    - name: Log in to Docker Hub
      uses: docker/login-action@v2  # Log in to Docker Hub
      with:
        username: ${{ secrets.DOCKER_USERNAME }}  # Docker Hub username stored in GitHub Secrets
        password: ${{ secrets.DOCKER_PASSWORD }}  # Docker Hub password stored in GitHub Secrets

    - name: Pull the Docker image from Docker Hub
      run: |
        docker pull abdochtouki/my-app:${{ github.sha }}  # Pull the image from Docker Hub with the commit SHA tag

    - name: Deploy the Docker container (Example: Run the container in production)
      run: |
        docker run -d -p 8080:80 abdochtouki/my-app:${{ github.sha }}  # Run the container on port 8080
