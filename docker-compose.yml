version: '3.8'

services:
  # Service pour l'application Akaunting
  app:
    build: .
    container_name: akaunting-app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8081
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=akaunting
      - DB_USERNAME=root
      - DB_PASSWORD=root
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    ports:
      - "8081:80"
    networks:
      - akaunting-network
    command: >
      bash -c "until mysql -h db -u root -proot -e 'select 1'; do echo 'Waiting for MySQL...'; sleep 3; done; php artisan migrate --force; apache2-foreground"
  
  # Service pour la base de données MySQL
  db:
    image: mysql:8
    container_name: akaunting-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=akaunting
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh  # Si tu as un script d'initialisation
    networks:
      - akaunting-network

networks:
  akaunting-network:
    driver: bridge

volumes:
  db_data:

