version: '3.8'

services:
  app:
    build: .
    container_name: akaunting-app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8081
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=akaunting
      - DB_USERNAME=root
      - DB_PASSWORD=root
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    ports:
      - "8081:80"
    networks:
      - akaunting-network

  db:
    image: mysql:8
    container_name: akaunting-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=akaunting
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - akaunting-network

networks:
  akaunting-network:
    driver: bridge

volumes:
  db_data:
